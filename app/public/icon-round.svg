<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FreeUltraCode game development icon</title>
  <desc id="desc">A dark game-development icon with code brackets, an asset cube, a play symbol, and connected engine nodes.</desc>
  <defs>
    <radialGradient id="plate" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(178 126) rotate(48) scale(356)">
      <stop stop-color="#20324A"/>
      <stop offset=".48" stop-color="#10292C"/>
      <stop offset="1" stop-color="#0A0F18"/>
    </radialGradient>
    <linearGradient id="rim" x1="76" y1="66" x2="438" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset=".48" stop-color="#45D1B5"/>
      <stop offset="1" stop-color="#F6C453"/>
    </linearGradient>
    <linearGradient id="panel" x1="116" y1="118" x2="402" y2="395" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1625"/>
      <stop offset=".6" stop-color="#0D1F23"/>
      <stop offset="1" stop-color="#17151D"/>
    </linearGradient>
    <linearGradient id="assetTop" x1="208" y1="156" x2="318" y2="248" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#45D1B5"/>
    </linearGradient>
    <linearGradient id="assetSide" x1="284" y1="226" x2="338" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6D067"/>
      <stop offset="1" stop-color="#A67C2B"/>
    </linearGradient>
    <linearGradient id="codeStroke" x1="122" y1="176" x2="388" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8ECF7"/>
      <stop offset=".5" stop-color="#F4F8F2"/>
      <stop offset="1" stop-color="#C6B46B"/>
    </linearGradient>
    <filter id="shadow" x="-22%" y="-22%" width="144%" height="144%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity=".46"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.9 0 0 0 0 0.82 0 0 0 0.52 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <clipPath id="clip">
      <circle cx="256" cy="256" r="220"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="110" fill="#05080D"/>
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="218" fill="url(#plate)"/>
    <circle cx="256" cy="256" r="215" stroke="url(#rim)" stroke-width="6" stroke-opacity=".9"/>
    <circle cx="256" cy="256" r="178" stroke="#D8F7EF" stroke-width="2" stroke-opacity=".12"/>
    <circle cx="256" cy="256" r="132" stroke="#7DD3FC" stroke-width="2" stroke-opacity=".08"/>
  </g>

  <g clip-path="url(#clip)">
    <path d="M48 342 C132 298 166 374 252 312 C330 256 364 334 466 228" stroke="#45D1B5" stroke-width="42" stroke-linecap="round" stroke-opacity=".08"/>
    <path d="M58 162 C138 102 200 164 258 174 C328 186 368 140 462 88" stroke="#F6C453" stroke-width="34" stroke-linecap="round" stroke-opacity=".08"/>
    <g stroke="#E8F4EF" stroke-width="1.5" stroke-opacity=".08">
      <path d="M78 154 H434"/>
      <path d="M62 256 H450"/>
      <path d="M92 366 H420"/>
      <path d="M148 78 V432"/>
      <path d="M256 58 V454"/>
      <path d="M370 90 V414"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <path d="M132 130 C168 110 222 124 276 116 C336 108 388 126 412 168 C436 210 414 254 420 304 C426 356 386 390 334 394 C284 398 236 382 186 394 C138 405 104 372 98 324 C92 276 112 244 102 200 C94 164 106 144 132 130 Z" fill="url(#panel)"/>
    <path d="M132 130 C168 110 222 124 276 116 C336 108 388 126 412 168 C436 210 414 254 420 304 C426 356 386 390 334 394 C284 398 236 382 186 394 C138 405 104 372 98 324 C92 276 112 244 102 200 C94 164 106 144 132 130 Z" stroke="url(#rim)" stroke-width="5" stroke-opacity=".86"/>
    <path d="M130 162 C172 152 226 160 266 156 C312 152 350 153 390 164" stroke="#C7CEC9" stroke-opacity=".14" stroke-width="28" stroke-linecap="round"/>
    <circle cx="144" cy="162" r="7" fill="#7DD3FC"/>
    <circle cx="168" cy="162" r="7" fill="#45D1B5"/>
    <circle cx="192" cy="162" r="7" fill="#F6C453"/>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M194 206 L145 258 L194 310" stroke="url(#codeStroke)" stroke-width="28"/>
    <path d="M318 206 L367 258 L318 310" stroke="url(#codeStroke)" stroke-width="28"/>
  </g>

  <g filter="url(#glow)">
    <path d="M256 184 L320 221 V294 L256 331 L192 294 V221 L256 184 Z" fill="#122737" stroke="#EAF8F2" stroke-width="8" stroke-linejoin="round"/>
    <path d="M256 184 L320 221 L256 258 L192 221 L256 184 Z" fill="url(#assetTop)"/>
    <path d="M256 258 L320 221 V294 L256 331 V258 Z" fill="url(#assetSide)"/>
    <path d="M192 221 L256 258 V331 L192 294 V221 Z" fill="#245873"/>
    <path d="M249 232 L290 256 L249 280 Z" fill="#F8FAFC"/>
  </g>

  <g opacity=".92" stroke-linecap="round">
    <path d="M184 374 C216 366 264 376 326 368" stroke="#45D1B5" stroke-width="16"/>
    <path d="M142 422 C166 406 194 408 216 424" stroke="#7DD3FC" stroke-width="10"/>
    <path d="M340 418 C364 402 394 406 418 422" stroke="#F6C453" stroke-width="10"/>
  </g>
  <circle cx="180" cy="422" r="9" fill="#D8F7EF"/>
  <circle cx="380" cy="420" r="9" fill="#F6D067"/>
</svg>
